<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Home</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f0f1a;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

header{
  padding:20px;
  font-size:20px;
  font-weight:bold;
}

.input-area{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:20px;
}

input,select{
  padding:6px 8px;
  border-radius:6px;
  border:none;
  outline:none;
}

button{
  background:#5c7cfa;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

.category-section{
  width:90%;
  max-width:600px;
  margin-bottom:20px;
}

.category-title{
  font-size:16px;
  margin-bottom:10px;
  border-left:4px solid #5c7cfa;
  padding-left:8px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.arrow{
  transition:transform .2s;
}

.arrow.closed{
  transform:rotate(-90deg);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,60px);
  gap:12px;
}

.card{
  width:60px;
  height:60px;
  background:linear-gradient(135deg,#1c1c2e,#27273f);
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:grab;
  font-size:11px;
  font-weight:bold;
  text-align:center;
  transition:.15s;
}

.card:hover{
  transform:scale(1.08);
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<header>My Home</header>

<div class="input-area">
  <input type="text" id="titleInput" placeholder="タイトル">
  <input type="text" id="urlInput" placeholder="URL">
  <select id="categorySelect"></select>
  <button onclick="createCategory()">＋新規カテゴリー</button>
  <button onclick="addLink()">追加</button>
</div>

<div id="container"></div>

<script>
let links = JSON.parse(localStorage.getItem("links")) || [];
let categories = JSON.parse(localStorage.getItem("categories")) || ["その他"];
let categoryState = JSON.parse(localStorage.getItem("categoryState")) || {};

const container = document.getElementById("container");
const categorySelect = document.getElementById("categorySelect");

function save(){
  localStorage.setItem("links",JSON.stringify(links));
  localStorage.setItem("categories",JSON.stringify(categories));
  localStorage.setItem("categoryState",JSON.stringify(categoryState));
}

function updateCategorySelect(){
  categorySelect.innerHTML="";
  categories.forEach(cat=>{
    const option=document.createElement("option");
    option.value=cat;
    option.textContent=cat;
    categorySelect.appendChild(option);
  });
}

function createCategory(){
  const name=prompt("新しいカテゴリー名を入力");
  if(!name) return;
  if(categories.includes(name)){
    alert("そのカテゴリーは既にあります");
    return;
  }
  categories.push(name);
  categoryState[name]=true;
  save();
  updateCategorySelect();
  render();
}

function render(){
  container.innerHTML="";

  categories.forEach(category=>{

    if(categoryState[category]===undefined){
      categoryState[category]=true;
    }

    const section=document.createElement("div");
    section.className="category-section";

    const title=document.createElement("div");
    title.className="category-title";

    const arrow=document.createElement("span");
    arrow.className="arrow";
    arrow.textContent="▶";

    if(!categoryState[category]){
      arrow.classList.add("closed");
    }

    title.innerHTML=`<span>${category}</span>`;
    title.appendChild(arrow);

    const grid=document.createElement("div");
    grid.className="grid";

    if(!categoryState[category]){
      grid.classList.add("hidden");
    }

    title.addEventListener("click",()=>{
      categoryState[category]=!categoryState[category];
      save();
      render();
    });

    // このカテゴリーのリンクだけ表示
    links
      .filter(link=>link.category===category)
      .forEach((link,index)=>{
        const card=document.createElement("div");
        card.className="card";
        card.textContent=link.title.slice(0,2);
        card.dataset.index = links.indexOf(link);

        card.addEventListener("click",()=>{
          window.open(link.url,"_blank");
        });

        grid.appendChild(card);
      });

    section.appendChild(title);
    section.appendChild(grid);
    container.appendChild(section);

    // 並び替え保持対応
    new Sortable(grid,{
      animation:150,
      onEnd:function(){
        const newOrder=[];
        grid.querySelectorAll(".card").forEach(card=>{
          newOrder.push(links[card.dataset.index]);
        });

        // 他カテゴリーと合体
        const others = links.filter(l=>l.category!==category);
        links = [...others, ...newOrder];
        save();
        render();
      }
    });

  });
}

function addLink(){
  const title=document.getElementById("titleInput").value.trim();
  const url=document.getElementById("urlInput").value.trim();
  const category=categorySelect.value;

  if(!title||!url) return;

  links.push({title,url,category});
  save();
  render();

  document.getElementById("titleInput").value="";
  document.getElementById("urlInput").value="";
}

updateCategorySelect();
render();
</script>

</body>
</html>
