<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>My home</title>
<style>

header {
  padding: 18px;
  background: #333;
  color: white;
  text-align: center;
  font-weight: 500;
}

.container {
  padding: 20px;
}
        body {
  margin: 0;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 400;
  letter-spacing: 0;
}

.category {
  margin-bottom: 15px;
  border-radius: 8px;
  background: rgba(255,255,255,0.9);
  padding: 12px;
  border: 1px solid rgba(0,0,0,0.05);
}

.category h2 {
  margin: 0;
  font-weight: 500;
  font-size: 16px;
}

.links {
  margin-top: 10px;
}

.link-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
}

button {
  border-radius: 6px;
  font-family: inherit;
}

.add-btn {
  margin-top: 10px;
  background: #4CAF50;
  color: white;
}

.delete-btn {
  background: #f44336;
  color: white;
}

#editorPanel {
  position: fixed;
  bottom: 60px;
  left: 20px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  display: none;
  width: 250px;
}

#editToggle {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #333;
  color: white;
  padding: 10px 15px;
  border-radius: 30px;
}

input, select {
  width: 100%;
  margin-bottom: 8px;
  padding: 5px;
}

</style>
</head>
<body>

<header>
  <h1>my home</h1>
</header>

<div class="container" id="categories"></div>

<button id="editToggle">編集</button>

<div id="editorPanel">
  <h3>リンク追加</h3>
  <input type="text" id="linkName" placeholder="リンク名">
  <input type="text" id="linkURL" placeholder="URL">
  
  <select id="categorySelect"></select>
  <button onclick="addCategory()">＋新しいカテゴリー</button>

  <button class="add-btn" onclick="addLink()">追加</button>

  <hr>

  <h3>背景色変更</h3>
  <input type="color" id="colorPicker">
  <label>明るさ</label>
  <input type="range" id="brightness" min="50" max="150" value="100">
</div>

<script>
let data = JSON.parse(localStorage.getItem("linkData")) || {};

const categoriesDiv = document.getElementById("categories");
const categorySelect = document.getElementById("categorySelect");
const editorPanel = document.getElementById("editorPanel");

function saveData() {
  localStorage.setItem("linkData", JSON.stringify(data));
}

function render() {
  categoriesDiv.innerHTML = "";
  categorySelect.innerHTML = "";

  for (let category in data) {
    const catDiv = document.createElement("div");
    catDiv.className = "category";

    const title = document.createElement("h2");
    title.textContent = category;
    title.onclick = () => {
      linksDiv.style.display =
        linksDiv.style.display === "none" ? "block" : "none";
    };

    const linksDiv = document.createElement("div");
    linksDiv.className = "links";

    data[category].forEach((link, index) => {
      const linkItem = document.createElement("div");
      linkItem.className = "link-item";

      const a = document.createElement("a");
      a.href = link.url;
      a.textContent = link.name;
      a.target = "_blank";

      const delBtn = document.createElement("button");
      delBtn.textContent = "削除";
      delBtn.className = "delete-btn";
      delBtn.onclick = () => {
        data[category].splice(index, 1);
        saveData();
        render();
      };

      linkItem.appendChild(a);
      linkItem.appendChild(delBtn);
      linksDiv.appendChild(linkItem);
    });

    catDiv.appendChild(title);
    catDiv.appendChild(linksDiv);
    categoriesDiv.appendChild(catDiv);

    const option = document.createElement("option");
    option.value = category;
    option.textContent = category;
    categorySelect.appendChild(option);
  }
}

function addLink() {
  const name = document.getElementById("linkName").value;
  const url = document.getElementById("linkURL").value;
  const category = categorySelect.value;

  if (!name || !url || !category) return;

  data[category].push({ name, url });
  saveData();
  render();

  document.getElementById("linkName").value = "";
  document.getElementById("linkURL").value = "";
}

function addCategory() {
  const newCategory = prompt("カテゴリー名を入力");
  if (!newCategory) return;
  if (!data[newCategory]) {
    data[newCategory] = [];
    saveData();
    render();
  }
}

document.getElementById("editToggle").onclick = () => {
  editorPanel.style.display =
    editorPanel.style.display === "none" ? "block" : "none";
};

const colorPicker = document.getElementById("colorPicker");
const brightness = document.getElementById("brightness");

function updateBackground() {
  document.body.style.background =
    `hsl(${hexToHue(colorPicker.value)}, 60%, ${brightness.value}%)`;
}

colorPicker.oninput = updateBackground;
brightness.oninput = updateBackground;

function hexToHue(hex) {
  const r = parseInt(hex.substr(1,2),16)/255;
  const g = parseInt(hex.substr(3,2),16)/255;
  const b = parseInt(hex.substr(5,2),16)/255;
  const max = Math.max(r,g,b);
  const min = Math.min(r,g,b);
  let h;
  if(max === min) h = 0;
  else if(max === r) h = 60 * ((g-b)/(max-min));
  else if(max === g) h = 60 * (2+(b-r)/(max-min));
  else h = 60 * (4+(r-g)/(max-min));
  return Math.round(h < 0 ? h+360 : h);
}

render();
</script>

</body>
</html>
