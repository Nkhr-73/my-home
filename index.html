<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Link Memo</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1e1e2f,#12121a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

h1{
  margin-top:40px;
  font-weight:300;
  letter-spacing:2px;
}

.container{
  width:90%;
  max-width:600px;
  margin-top:30px;
}

.input-area{
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#6c63ff;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#5750d6;
}

.memo{
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
  animation:fadeIn 0.3s ease;
}

.memo a{
  color:#8ab4ff;
  text-decoration:none;
}

.memo a:hover{
  text-decoration:underline;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<h1>My Link Memo</h1>

<div class="container">

<div class="input-area">
  <input type="text" id="title" placeholder="Title">
  <input type="text" id="url" placeholder="https://example.com">
  <button onclick="addMemo()">Add</button>
</div>

<div id="memoList"></div>

</div>

<script>
let memos = JSON.parse(localStorage.getItem("memos")) || [];

function save(){
  localStorage.setItem("memos", JSON.stringify(memos));
}



function addMemo(){
  const title=document.getElementById("title").value;
  const url=document.getElementById("url").value;

  if(title && url){
    memos.push({title,url});
    save();
    render();
    document.getElementById("title").value="";
    document.getElementById("url").value="";
  }
}

function deleteMemo(index){
  memos.splice(index,1);
  save();
  render();
}

render();
</script>

</body>
</html>
