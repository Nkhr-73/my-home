<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Home</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f0f1a;
  color: white;
}

header {
  padding: 15px 20px;
  font-size: 18px;
  font-weight: bold;
}

.input-area {
  padding: 15px 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

input {
  padding: 6px 8px;
  border-radius: 6px;
  border: none;
  outline: none;
}

button {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.add-btn {
  background: #5c7cfa;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 60px);
  gap: 12px;
  padding: 20px;
}

.card {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #1c1c2e, #27273f);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: pointer;
  transition: 0.15s;
  font-size: 11px;
  font-weight: bold;
  text-align: center;
}

.card:hover {
  transform: scale(1.08);
}

.menu-btn {
  position: absolute;
  top: 3px;
  right: 6px;
  font-size: 12px;
  cursor: pointer;
  z-index: 10;
}

.dropdown {
  position: absolute;
  top: 20px;
  right: 0;
  background: #2c2c44;
  border-radius: 6px;
  display: none;
  flex-direction: column;
  z-index: 9999;
  min-width: 70px;
}

.dropdown button {
  background: none;
  color: white;
  border: none;
  padding: 6px 8px;
  font-size: 12px;
  text-align: left;
  cursor: pointer;
}

.dropdown button:hover {
  background: #3d3d5c;
}
</style>
</head>

<body>

<header>My Home</header>

<div class="input-area">
  <input type="text" id="titleInput" placeholder="タイトル">
  <input type="text" id="urlInput" placeholder="URL">
  <button class="add-btn" onclick="addLink()">追加</button>
</div>

<div class="grid" id="grid"></div>

<script>
let links = JSON.parse(localStorage.getItem("links")) || [];

function save() {
  localStorage.setItem("links", JSON.stringify(links));
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  links.forEach((link, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="menu-btn" onclick="toggleMenu(event, ${index})">⋯</div>
      <div class="dropdown" id="menu-${index}">
        <button onclick="editLink(${index})">編集</button>
        <button onclick="deleteLink(${index})">削除</button>
      </div>
      ${link.title.slice(0, 2)}
    `;

    card.onclick = () => {
      window.open(link.url, "_blank");
    };

    grid.appendChild(card);
  });
}

function addLink() {
  const title = document.getElementById("titleInput").value.trim();
  const url = document.getElementById("urlInput").value.trim();
  if (!title || !url) return;

  links.push({ title, url });
  save();
  render();

  document.getElementById("titleInput").value = "";
  document.getElementById("urlInput").value = "";
}

function deleteLink(index) {
  links.splice(index, 1);
  save();
  render();
}

function editLink(index) {
  const newTitle = prompt("新しいタイトル", links[index].title);
  const newUrl = prompt("新しいURL", links[index].url);
  if (!newTitle || !newUrl) return;

  links[index] = { title: newTitle.trim(), url: newUrl.trim() };
  save();
  render();
}

function toggleMenu(event, index) {
  event.stopPropagation();
  document.querySelectorAll(".dropdown").forEach(menu => menu.style.display = "none");
  const menu = document.getElementById(`menu-${index}`);
  menu.style.display = "flex";
}

document.addEventListener("click", () => {
  document.querySelectorAll(".dropdown").forEach(menu => menu.style.display = "none");
});

render();
</script>

</body>
</html>
