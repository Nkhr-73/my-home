<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Home</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f0f1a;
  color: white;
}

header {
  padding: 15px 20px;
  font-size: 18px;
  font-weight: bold;
}

.input-area {
  padding: 15px 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

input {
  padding: 6px 8px;
  border-radius: 6px;
  border: none;
  outline: none;
}

button {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.add-btn {
  background: #5c7cfa;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 60px);
  gap: 12px;
  padding: 20px;
  justify-content: center; /* 中央ぞろえ */
}

.card {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #1c1c2e, #27273f);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: grab;
  transition: 0.15s;
  font-size: 11px;
  font-weight: bold;
  text-align: center;
  user-select: none;
}

.card:active {
  cursor: grabbing;
}

.card:hover {
  transform: scale(1.08);
}

.dragging {
  opacity: 0.5;
}

.menu-btn {
  position: absolute;
  top: 3px;
  right: 6px;
  font-size: 12px;
  cursor: pointer;
  z-index: 10;
}

.dropdown {
  position: absolute;
  top: 20px;
  right: 0;
  background: #2c2c44;
  border-radius: 6px;
  display: none;
  flex-direction: column;
  z-index: 9999;
  min-width: 70px;
}

.dropdown button {
  background: none;
  color: white;
  border: none;
  padding: 6px 8px;
  font-size: 12px;
  text-align: left;
  cursor: pointer;
}

.dropdown button:hover {
  background: #3d3d5c;
}
  body {
  margin: 0;
  font-family: sans-serif;
  background: #0f0f1a;
  color: white;

  display: flex;
  flex-direction: column;
  align-items: center;   /* 横中央 */
}

header {
  padding: 15px 20px;
  font-size: 18px;
  font-weight: bold;
  text-align: center;
  width: 100%;
}

.input-area {
  padding: 15px 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;   /* 入力欄中央 */
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 60px);
  gap: 12px;
  padding: 20px;
  justify-content: center;   /* タイル中央 */
  max-width: 500px;          /* 広がりすぎ防止 */
  width: 100%;
}
</style>

</head>

<body>

<header>My Home</header>

<div class="input-area">
  <input type="text" id="titleInput" placeholder="タイトル">
  <input type="text" id="urlInput" placeholder="URL">
  <button class="add-btn" onclick="addLink()">追加</button>
</div>

<div class="grid" id="grid"></div>

<script>
let links = JSON.parse(localStorage.getItem("links")) || [];

const grid = document.getElementById("grid");

function save() {
  localStorage.setItem("links", JSON.stringify(links));
}

function render() {
  grid.innerHTML = "";

  links.forEach((link) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="menu-btn">⋯</div>
      <div class="dropdown">
        <button class="edit">編集</button>
        <button class="delete">削除</button>
      </div>
      ${link.title.slice(0,2)}
    `;

    // 開く
    card.addEventListener("click", () => {
      window.open(link.url, "_blank");
    });

    // メニューボタン
    const menuBtn = card.querySelector(".menu-btn");
    const dropdown = card.querySelector(".dropdown");

    menuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      document.querySelectorAll(".dropdown").forEach(d => d.style.display = "none");
      dropdown.style.display = "flex";
    });

    // 編集
    card.querySelector(".edit").addEventListener("click", (e) => {
      e.stopPropagation();
      const newTitle = prompt("新しいタイトル", link.title);
      const newUrl = prompt("新しいURL", link.url);
      if (!newTitle || !newUrl) return;
      link.title = newTitle.trim();
      link.url = newUrl.trim();
      save();
      render();
    });

    // 削除
    card.querySelector(".delete").addEventListener("click", (e) => {
      e.stopPropagation();
      links = links.filter(l => l !== link);
      save();
      render();
    });

    grid.appendChild(card);
  });
}

// 外クリックでメニュー閉じる
document.addEventListener("click", () => {
  document.querySelectorAll(".dropdown").forEach(d => d.style.display = "none");
});

// 並び替え（←ここは1回だけ）
new Sortable(grid, {
  animation: 150,
  ghostClass: "dragging",
  onEnd: function () {
    const newLinks = [];
    document.querySelectorAll(".card").forEach(card => {
      const text = card.textContent.trim();
      const original = links.find(l => l.title.slice(0,2) === text);
      if (original) newLinks.push(original);
    });
    links = newLinks;
    save();
  }
});

function addLink() {
  const title = document.getElementById("titleInput").value.trim();
  const url = document.getElementById("urlInput").value.trim();
  if (!title || !url) return;

  links.push({ title, url });
  save();
  render();

  document.getElementById("titleInput").value = "";
  document.getElementById("urlInput").value = "";
}

render();
</script>

</body>
</html>
