<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Home</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f0f1a;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  padding: 20px;
  font-size: 20px;
  font-weight: bold;
}

.input-area {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 20px;
}

input {
  padding: 6px 8px;
  border-radius: 6px;
  border: none;
  outline: none;
}

button {
  background: #5c7cfa;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}

.category-section {
  width: 90%;
  max-width: 600px;
  margin-bottom: 25px;
}

.category-title {
  font-size: 16px;
  margin-bottom: 10px;
  border-left: 4px solid #5c7cfa;
  padding-left: 8px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 60px);
  gap: 12px;
}

.card {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #1c1c2e, #27273f);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: grab;
  font-size: 11px;
  font-weight: bold;
  text-align: center;
  transition: 0.15s;
}

.card:hover {
  transform: scale(1.08);
}

.dragging {
  opacity: 0.5;
}
</style>
</head>

<body>

<header>My Home</header>

<div class="input-area">
  <input type="text" id="titleInput" placeholder="タイトル">
  <input type="text" id="urlInput" placeholder="URL">
  <input type="text" id="categoryInput" placeholder="カテゴリー">
  <button onclick="addLink()">追加</button>
</div>

<div id="container"></div>

<script>
let links = JSON.parse(localStorage.getItem("links")) || [];
const container = document.getElementById("container");

function save() {
  localStorage.setItem("links", JSON.stringify(links));
}

function render() {
  container.innerHTML = "";

  // カテゴリーごとにまとめる
  const grouped = {};
  links.forEach(link => {
    if (!grouped[link.category]) {
      grouped[link.category] = [];
    }
    grouped[link.category].push(link);
  });

  Object.keys(grouped).forEach(category => {

    const section = document.createElement("div");
    section.className = "category-section";

    const title = document.createElement("div");
    title.className = "category-title";
    title.textContent = category;

    const grid = document.createElement("div");
    grid.className = "grid";

    grouped[category].forEach(link => {
      const card = document.createElement("div");
      card.className = "card";
      card.textContent = link.title.slice(0,2);

      card.addEventListener("click", () => {
        window.open(link.url, "_blank");
      });

      grid.appendChild(card);
    });

    section.appendChild(title);
    section.appendChild(grid);
    container.appendChild(section);

    new Sortable(grid, {
      animation: 150,
      ghostClass: "dragging"
    });
  });
}

function addLink() {
  const title = document.getElementById("titleInput").value.trim();
  const url = document.getElementById("urlInput").value.trim();
  const category = document.getElementById("categoryInput").value.trim() || "その他";

  if (!title || !url) return;

  links.push({ title, url, category });
  save();
  render();

  document.getElementById("titleInput").value = "";
  document.getElementById("urlInput").value = "";
  document.getElementById("categoryInput").value = "";
}

render();
</script>

</body>
</html>
